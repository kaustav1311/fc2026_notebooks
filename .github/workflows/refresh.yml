name: warehouse refresh

# ─────────────────────────────────────────────────────────────────────────────
# Runs refresh.py + _emit_pwa_json.py on a schedule, then pushes the freshly
# emitted JSONs into the PWA repo (kaustav1311/fifawc2026 → public/data/).
# Vercel auto-redeploys on that push.
#
# Cadence:
#   • Hourly cron `0 * * * *` always fires. Inside the tournament window
#     (2026-06-11 → 2026-07-20), refresh.py picks the hourly bucket (or
#     hourly + daily on the first tick at-or-after 07:00 UTC each day).
#     Outside the window, refresh.py exits early with no work (~5 sec run).
#   • workflow_dispatch lets you trigger manually, optionally with a bucket
#     override (hourly / daily / all / frozen) for one-off re-builds.
#
# Efficiency:
#   • data/raw/ + data/processed/ + .event_state.json are restored from the
#     Actions cache at run start and saved back at run end. This keeps the
#     event-driven gating in REFRESH.md effective — typical tick is 30–150
#     upstream fetches, not 3000.
#   • The first run will be a cold start (no cache hit, ~15–25 min). Every
#     subsequent run reuses the cache and finishes in ~2–4 min.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      bucket:
        description: 'Override bucket (leave empty for auto; or hourly / daily / all / frozen)'
        required: false
        default: ''
        type: string
      force_refresh:
        description: 'Force re-fetch ignoring cached payloads'
        required: false
        default: false
        type: boolean

# One refresh at a time — if a prior run is still going, skip rather than
# stacking up parallel pulls against the same upstream APIs.
concurrency:
  group: warehouse-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout warehouse repo
        uses: actions/checkout@v4

      # The notebooks read hand-curated seeds out of the PWA repo
      # (src/data/teams.ts, fixtures.ts, venues.ts, espnAbbrIso.ts, and
      # services/espn.ts) — see lib/seed_loader.py. We check the PWA repo out
      # alongside the warehouse here and point AUDIT_APP_PATH at it later.
      # Same checkout is reused at the end of the workflow to commit + push
      # the freshly-emitted JSONs back, so we get cross-repo seed + push for
      # the price of one clone.
      - name: Checkout PWA repo (for seeds + JSON push)
        uses: actions/checkout@v4
        with:
          repository: kaustav1311/fifawc2026
          path: pwa-repo
          token: ${{ secrets.PWA_REPO_PAT }}

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # nbclient executes notebooks via a "python3" kernel — needs ipykernel.
          pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      # ── 3. Restore the raw/processed/event-state cache ────────────────────
      # Cache key includes the run id so each run writes a unique entry;
      # restore-keys do a prefix match to pick the most recent cache. Old
      # entries get evicted by GHA's 7-day-no-access policy.
      - name: Restore warehouse cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/processed
            data/.event_state.json
            data/.last_daily_run
          key: warehouse-cache-${{ github.run_id }}
          restore-keys: |
            warehouse-cache-

      - name: Report cache state
        run: |
          echo "Cache restored from: ${{ steps.cache-restore.outputs.cache-matched-key || 'NONE (cold start)' }}"
          echo "data/raw exists: $(test -d data/raw && echo yes || echo no)"
          echo "data/processed exists: $(test -d data/processed && echo yes || echo no)"
          echo "event_state exists: $(test -f data/.event_state.json && echo yes || echo no)"

      # ── 3.5. Pre-create data/raw/ subdirs ────────────────────────────────
      # Notebook 01 writes directly to data/raw/transfermarkt/national_teams.csv
      # via Path.write_bytes(), which does NOT auto-create parent dirs. On a
      # local machine these dirs exist from prior runs; on a fresh GHA runner
      # they don't. mkdir -p is a no-op when the cache restore already brought
      # the dirs, so this is safe to run every tick.
      - name: Pre-create data/raw subdirs
        run: |
          mkdir -p \
            data/raw/transfermarkt \
            data/raw/footymetrics \
            data/raw/fotmob \
            data/raw/polymarket \
            data/raw/fifa \
            data/raw/fifa_fantasy \
            data/raw/fdh \
            data/raw/espn \
            data/raw/open_meteo \
            data/raw/worldreferee

      # ── 4. Refresh — runs refresh.py with optional bucket override ────────
      # data/processed/ is committed as a bootstrap baseline, so a fresh
      # runner always has the upstream parquets (wc26_nations, wc26_matches,
      # referee_master, …) on disk before the hourly notebooks try to load
      # them. refresh.py then overwrites with fresher versions during the run.
      # AUDIT_APP_PATH points lib/seed_loader.py at the PWA checkout above so
      # notebooks 01/02/03 can re-parse teams.ts / venues.ts / fixtures.ts.
      #
      # Cold-cache bootstrap: the hourly notebooks 05 (refs assignments) and
      # 11 (FotMob WC/form) READ raw HTML/JSON files in data/raw/footymetrics/
      # and data/raw/fotmob/ that are produced by the daily notebooks 04 and
      # 08. Hourly cron doesn't run those. So on a cold runner with no warm
      # data/raw/ cache, the hourly bundle alone leaves nb_05 and nb_11 with
      # empty inputs → KeyError. Detect missing raw subdirs and run --bucket
      # all (frozen + daily + hourly) on that tick so the daily notebooks
      # populate data/raw/ before the hourly ones read it. Subsequent runs
      # with a warm cache use the normal hourly bundle.
      - name: Run refresh.py
        env:
          AUDIT_APP_PATH: ${{ github.workspace }}/pwa-repo
        run: |
          ARGS=""
          if [ -n "${{ inputs.bucket }}" ]; then
            ARGS="$ARGS --bucket ${{ inputs.bucket }}"
          elif [ ! -d data/raw/footymetrics ] || [ -z "$(ls -A data/raw/footymetrics 2>/dev/null)" ] \
               || [ ! -d data/raw/fotmob ] || [ -z "$(ls -A data/raw/fotmob 2>/dev/null)" ]; then
            echo "::notice::Cold cache detected (data/raw/footymetrics or data/raw/fotmob empty). Bootstrapping with --bucket all so the daily notebooks (04, 08) populate the raw cache before the hourly ones read it. This run will take 30-50 min; subsequent cached runs go back to 2-4 min hourly."
            ARGS="$ARGS --bucket all"
          fi
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          echo "Running: python refresh.py $ARGS  (AUDIT_APP_PATH=$AUDIT_APP_PATH)"
          # refresh.py exits 1 if ANY notebook failed (per-notebook try/except
          # in refresh.py already catches the exception, logs it, and keeps
          # going through the rest). We tolerate that exit code so emit + push
          # still run — the notebooks that succeeded have produced fresh
          # parquets, and the ones that failed leave the committed baseline
          # in place. Git diff at the push step decides what's actually new.
          python refresh.py $ARGS || echo "::warning::refresh.py exited non-zero (some notebooks failed). Continuing to emit + push for the successful ones."

      # ── 5. Emit JSON for the PWA ──────────────────────────────────────────
      - name: Emit PWA JSON
        run: |
          if [ ! -d data/processed ] || [ -z "$(ls -A data/processed 2>/dev/null)" ]; then
            echo "data/processed is empty (refresh.py probably exited early — out of tournament window or no work)."
            echo "Skipping emit + push."
            echo "SKIP_PUSH=1" >> $GITHUB_ENV
            exit 0
          fi
          python _emit_pwa_json.py
          ls -la data/processed/json/

      # ── 6. Push emitted JSON to the PWA repo ──────────────────────────────
      # Reuses the pwa-repo/ checkout from step 1 (same PAT, same working
      # copy). Drop new files in, commit only if anything changed, push.
      # Vercel picks it up on the next webhook.
      - name: Push JSON to PWA repo
        if: env.SKIP_PUSH != '1'
        run: |
          if [ ! -d pwa-repo ]; then
            echo "ERROR: pwa-repo/ checkout missing. PWA_REPO_PAT probably wasn't set on the early checkout."
            exit 1
          fi
          mkdir -p pwa-repo/public/data
          cp data/processed/json/*.json pwa-repo/public/data/
          cd pwa-repo
          git config user.name "wc26-refresh-bot"
          git config user.email "wc26-refresh-bot@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No JSON changes vs PWA HEAD — nothing to commit."
            exit 0
          fi
          STAMP="$(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "chore: warehouse refresh ${STAMP}"
          git push
          echo "Pushed updated JSONs to kaustav1311/fifawc2026. Vercel will redeploy."

      # ── 7. Save the cache for next run ───────────────────────────────────
      # Save unconditionally so even a partial run (e.g. refresh succeeded but
      # emit failed) keeps the partially-updated raw cache for next tick.
      # continue-on-error: a benign "cache already exists" warning from the
      # Actions service shouldn't mark the whole run as failed — the saved
      # cache is still usable on the next tick.
      - name: Save warehouse cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/processed
            data/.event_state.json
            data/.last_daily_run
          key: warehouse-cache-${{ github.run_id }}
